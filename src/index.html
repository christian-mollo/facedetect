<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Verificación Biométrica · Banco Fortaleza</title>
  <meta name="description" content="Sistema de verificación biométrica facial para apertura digital de cuentas - Banco Fortaleza Bolivia">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <!-- PWA / Brand meta -->
  <meta name="theme-color" content="#1C3B6E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Open Graph -->
  <meta property="og:title" content="Verificación Biométrica · Banco Fortaleza">
  <meta property="og:description" content="Verifica tu identidad de forma segura y rápida">
  <meta property="og:type" content="website">

  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  CONTENT SECURITY POLICY — SIFv3 Biometric Module          ║
    ╠══════════════════════════════════════════════════════════════╣
    ║  Directivas explicadas:                                     ║
    ║  default-src 'self'       → solo recursos propios           ║
    ║  script-src 'self' 'wasm-unsafe-eval'                       ║
    ║                           → requerido para WASM/MediaPipe   ║
    ║  worker-src blob: 'self'  → Web Workers compilados por CLI  ║
    ║  connect-src 'self' ...   → backend local + producción      ║
    ║  img-src 'self' data:     → data: para canvas toDataURL()   ║
    ║  media-src 'self'         → getUserMedia                    ║
    ╚══════════════════════════════════════════════════════════════╝
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'wasm-unsafe-eval';
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com;
    worker-src  blob: 'self';
    connect-src 'self' http://localhost:8080 https://api.bancofortaleza.com.bo;
    img-src     'self' data: blob:;
    media-src   'self' blob:;
    object-src  'none';
    base-uri    'self';
    form-action 'self';
  ">

  <!-- Permisos de hardware: solo cámara del propio origen -->
  <meta http-equiv="Permissions-Policy" content="camera=self, microphone=(), geolocation=()">

  <!-- Prevención de MIME sniffing -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- Referrer mínimo para privacidad -->
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <base href="/">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Fonts — preconectado antes del render para evitar FOUT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
